<div class="input-group">
    <label for="password">Senha Eletrônica</label>
    <input 
        type="text" 
        id="password" 
        inputmode="numeric" 
        pattern="[0-9]*" 
        maxlength="6" 
        placeholder="Digite sua senha"
        oninput="this.value = this.value.replace(/[^0-9]/g, '')"
    >
</div>
